<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- خلفية -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- ظل السيارة -->
  <ellipse cx="200" cy="180" rx="160" ry="40" fill="#e2e8f0"/>
  
  <!-- جسم السيارة -->
  <rect x="60" y="120" width="280" height="80" rx="10" fill="#374151" stroke="#2563eb" stroke-width="2"/>
  
  <!-- نوافذ -->
  <rect x="80" y="130" width="60" height="30" rx="5" fill="#3b82f6" opacity="0.3"/>
  <rect x="160" y="130" width="80" height="30" rx="5" fill="#3b82f6" opacity="0.3"/>
  <rect x="260" y="130" width="60" height="30" rx="5" fill="#3b82f6" opacity="0.3"/>
  
  <!-- العجلات -->
  <circle cx="120" cy="200" r="25" fill="#374151" stroke="#1f2937" stroke-width="3"/>
  <circle cx="120" cy="200" r="15" fill="#6b7280"/>
  <circle cx="280" cy="200" r="25" fill="#374151" stroke="#1f2937" stroke-width="3"/>
  <circle cx="280" cy="200" r="15" fill="#6b7280"/>
  
  <!-- المقدمة -->
  <rect x="140" y="100" width="120" height="20" rx="10" fill="#374151"/>
  
  <!-- المصابيح الأمامية -->
  <rect x="100" y="160" width="20" height="10" rx="5" fill="#fbbf24"/>
  <rect x="280" y="160" width="20" height="10" rx="5" fill="#fbbf24"/>
  
  <text x="200" y="250" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="16" dir="rtl">هوندا أكورد 2020</text>
</svg>
